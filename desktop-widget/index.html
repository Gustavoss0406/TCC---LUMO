<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name=<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FocusBuddy Widget</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <div class="background-glow"></div>
  
  <!-- Container principal responsivo -->
  <main class="app-container">
    
    <!-- Header: Logo e Status -->
    <header class="app-header">
      <div class="logo-area">
        <img id="logo" src="https://i.ibb.co/jknDxrn5/Logo-darkmode.png" alt="FocusBuddy Logo" />
        <span class="app-name">FocusBuddy</span>
      </div>
      <div class="connection-status">
        <span class="status-dot"></span>
        <span id="status-text">Online</span>
      </div>
    </header>

    <!-- Conteúdo Principal: Personagem e Score -->
    <section class="main-content">
      <div class="character-wrapper">
        <div class="glow-effect"></div>
        <img id="character" src="https://i.imgur.com/qQ1JEPb.gif" alt="Character State" />
      </div>

      <div class="score-display">
        <span class="score-label">PRODUTIVIDADE</span>
        <h1 id="score">0%</h1>
      </div>
    </section>

    <!-- Controles (Estilo Player) -->
    <footer class="controls-area">
      <p id="current-activity" class="activity-text">Aguardando atividade...</p>
      
      <div class="buttons-group">
        <button id="stop" class="control-btn secondary" title="Pausar Rastreamento">
          <i data-lucide="pause"></i>
        </button>
        
        <button id="start" class="control-btn primary" title="Iniciar Foco">
          <i data-lucide="play"></i>
        </button>
        
        <button id="settings" class="control-btn secondary" title="Configurações">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </footer>
  </main>

  <script src="renderer.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
